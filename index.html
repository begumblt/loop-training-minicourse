<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta property="og:title" content="Microsoft Loop Training Minicourse" />
<meta property="og:description" content="Learn Microsoft Loop at your own pace. One file, no setup, free to use." />
<meta property="og:image" content="https://begumblt.github.io/loop-training-minicourse/preview.png" />
<meta property="og:url" content="https://begumblt.github.io/loop-training-minicourse/" />
<meta property="og:type" content="website" />
<title>Loop, Looped In — A hands-on Microsoft Loop course</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1b1430;
    --ink-soft:#251c3d;
    --violet:#6e56f8;
    --violet-bright:#8a72ff;
    --magenta:#ec4899;
    --canvas:#f6f4fc;
    --paper:#ffffff;
    --mint:#13b083;
    --mint-soft:#e3f7ef;
    --text:#241b3a;
    --muted:#6c648a;
    --muted-2:#928bab;
    --hairline:#e9e4f5;
    --hairline-2:#f0ecfa;
    --shadow:0 1px 2px rgba(27,20,48,.04),0 12px 32px -16px rgba(27,20,48,.22);
    --shadow-lg:0 24px 60px -24px rgba(27,20,48,.4);
    --grad:linear-gradient(125deg,#6e56f8 0%,#a855f7 45%,#ec4899 100%);
    --grad-soft:linear-gradient(125deg,rgba(110,86,248,.12),rgba(236,72,153,.12));
    --r-lg:22px; --r-md:15px; --r-sm:10px;
    --fd:'Bricolage Grotesque',system-ui,sans-serif;
    --fb:'Hanken Grotesk',system-ui,sans-serif;
    --fm:'JetBrains Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--fb);
    color:var(--text);
    background:var(--canvas);
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  a{color:var(--violet);text-decoration:none}
  a:hover{text-decoration:underline}
  ::selection{background:rgba(138,114,255,.28)}
  :focus-visible{outline:2.5px solid var(--violet);outline-offset:2px;border-radius:4px}

  /* ---------- Shell ---------- */
  .shell{display:grid;grid-template-columns:312px 1fr;min-height:100vh}

  /* ---------- Sidebar ---------- */
  .rail{
    background:var(--ink);
    color:#efeaff;
    position:sticky;top:0;height:100vh;
    display:flex;flex-direction:column;
    border-right:1px solid rgba(255,255,255,.06);
    overflow:hidden;
  }
  .rail-head{padding:22px 22px 16px}
  .brand{display:flex;align-items:center;gap:11px}
  .brand .mark{width:34px;height:34px;flex:0 0 auto}
  .brand .name{font-family:var(--fd);font-weight:800;font-size:18px;letter-spacing:-.02em;line-height:1.05}
  .brand .name b{display:block;font-weight:500;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#a99ee0;margin-top:2px;font-family:var(--fm)}

  .progress-card{
    margin:4px 18px 8px;padding:15px;border-radius:var(--r-md);
    background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.025));
    border:1px solid rgba(255,255,255,.08);
    display:flex;align-items:center;gap:14px;
  }
  .ring{width:54px;height:54px;flex:0 0 auto;position:relative}
  .ring svg{transform:rotate(-90deg)}
  .ring .pct{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--fm);font-weight:700;font-size:13px;color:#fff}
  .progress-card .meta{font-size:12.5px;color:#c7bef0;line-height:1.35}
  .progress-card .meta b{display:block;color:#fff;font-family:var(--fd);font-weight:700;font-size:14px;letter-spacing:-.01em}

  .nav{flex:1;overflow-y:auto;padding:8px 12px 12px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.18) transparent}
  .nav::-webkit-scrollbar{width:8px}
  .nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.16);border-radius:8px}
  .nav-label{font-family:var(--fm);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#7d72ad;padding:12px 12px 6px}
  .nav-item{
    width:100%;text-align:left;border:0;background:transparent;color:#d9d2f4;
    display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:11px;
    cursor:pointer;font-family:var(--fb);font-size:14px;font-weight:500;
    transition:background .16s ease,color .16s ease;position:relative;
  }
  .nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
  .nav-item.active{background:rgba(138,114,255,.20);color:#fff}
  .nav-item.active::before{content:"";position:absolute;left:-12px;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--grad)}
  .nav-num{
    width:24px;height:24px;flex:0 0 auto;border-radius:7px;display:grid;place-items:center;
    font-family:var(--fm);font-size:11px;font-weight:700;
    background:rgba(255,255,255,.08);color:#b3a8e0;transition:.16s;
  }
  .nav-item.active .nav-num{background:var(--grad);color:#fff}
  .nav-item.done .nav-num{background:var(--mint);color:#06281d}
  .nav-txt{flex:1;line-height:1.25}
  .nav-check{width:15px;height:15px;flex:0 0 auto;opacity:0;transition:.2s}
  .nav-item.done .nav-check{opacity:1}

  .rail-foot{padding:12px 18px 18px;border-top:1px solid rgba(255,255,255,.07)}
  .openloop{
    display:flex;align-items:center;justify-content:center;gap:9px;width:100%;
    padding:11px;border-radius:12px;border:0;cursor:pointer;
    background:var(--grad);color:#fff;font-family:var(--fb);font-weight:700;font-size:13.5px;
    box-shadow:0 8px 22px -10px rgba(236,72,153,.7);transition:transform .14s ease,filter .14s;
    text-decoration:none;
  }
  .openloop:hover{transform:translateY(-1px);filter:brightness(1.06);text-decoration:none}
  .rail-foot .hint{font-size:11px;color:#8c81b8;text-align:center;margin:9px 0 0;line-height:1.4}

  /* ---------- Main ---------- */
  .main{min-width:0;display:flex;flex-direction:column}
  .topbar{display:none}
  .canvas{max-width:824px;width:100%;margin:0 auto;padding:46px 40px 110px}

  .eyebrow{font-family:var(--fm);font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--violet);font-weight:700;display:flex;align-items:center;gap:10px}
  .eyebrow .dash{height:1.5px;width:26px;background:var(--grad);border-radius:2px}
  h1.module-title{font-family:var(--fd);font-weight:800;letter-spacing:-.03em;line-height:1.02;font-size:clamp(30px,4.4vw,46px);margin:16px 0 8px}
  .lede{font-size:18.5px;color:var(--muted);max-width:62ch;margin:0 0 6px;line-height:1.5}

  .module-body{margin-top:30px}
  .module-body h2{font-family:var(--fd);font-weight:700;letter-spacing:-.02em;font-size:23px;margin:38px 0 10px;line-height:1.15}
  .module-body h3{font-family:var(--fd);font-weight:700;font-size:17px;margin:26px 0 6px;letter-spacing:-.01em}
  .module-body p{margin:0 0 14px;font-size:16.5px}
  .module-body strong{color:var(--ink-soft);font-weight:700}
  .module-body ul{margin:4px 0 16px;padding:0;list-style:none}
  .module-body ul li{position:relative;padding:3px 0 3px 26px;font-size:16px}
  .module-body ul li::before{content:"";position:absolute;left:4px;top:13px;width:7px;height:7px;border-radius:50%;background:var(--grad)}
  .module-body .lo{color:var(--violet);font-weight:700}
  code.k{font-family:var(--fm);font-size:.86em;background:var(--grad-soft);color:#5b3fb8;padding:2px 7px;border-radius:6px;font-weight:700;border:1px solid var(--hairline)}

  /* concept cards / callouts */
  .card{background:var(--paper);border:1px solid var(--hairline);border-radius:var(--r-md);box-shadow:var(--shadow);padding:20px 22px;margin:18px 0}
  .note{background:var(--grad-soft);border:1px solid var(--hairline);border-radius:var(--r-md);padding:15px 18px;margin:18px 0;font-size:15px;display:flex;gap:12px;align-items:flex-start}
  .note .ic{flex:0 0 auto;width:22px;height:22px;margin-top:1px;color:var(--violet)}
  .note b{color:var(--ink-soft)}

  /* try-it box */
  .tryit{border:1.5px solid transparent;background:
      linear-gradient(var(--paper),var(--paper)) padding-box,
      var(--grad) border-box;
    border-radius:var(--r-lg);padding:22px 24px;margin:26px 0;box-shadow:var(--shadow)}
  .tryit-head{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .tryit-head .tag{font-family:var(--fm);font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#fff;background:var(--grad);padding:5px 10px;border-radius:999px}
  .tryit-head h3{font-family:var(--fd);font-weight:800;font-size:19px;margin:0;letter-spacing:-.02em}
  .tryit p.sub{margin:2px 0 14px;color:var(--muted);font-size:14.5px}
  .checklist{list-style:none;margin:0;padding:0}
  .checklist li{margin:0}
  .checklist label{display:flex;gap:13px;align-items:flex-start;padding:10px 12px;border-radius:11px;cursor:pointer;transition:background .14s;font-size:15.5px}
  .checklist label:hover{background:var(--hairline-2)}
  .checklist input{position:absolute;opacity:0;width:0;height:0}
  .box{flex:0 0 auto;width:22px;height:22px;border-radius:7px;border:2px solid var(--hairline);background:#fff;margin-top:1px;display:grid;place-items:center;transition:.16s}
  .box svg{width:13px;height:13px;color:#fff;opacity:0;transform:scale(.5);transition:.16s}
  .checklist input:checked + .box{background:var(--mint);border-color:var(--mint)}
  .checklist input:checked + .box svg{opacity:1;transform:scale(1)}
  .checklist input:checked ~ .ctxt{color:var(--muted-2);text-decoration:line-through;text-decoration-color:var(--hairline)}
  .ctxt{line-height:1.4}
  .ctxt b{color:var(--ink-soft)}
  .tryit-foot{margin-top:12px;font-size:13px;color:var(--muted-2);display:flex;align-items:center;gap:8px}
  .openloop-sm{display:inline-flex;align-items:center;gap:7px;font-family:var(--fb);font-weight:700;font-size:13px;color:var(--violet);background:var(--grad-soft);border:1px solid var(--hairline);padding:6px 12px;border-radius:999px;cursor:pointer;text-decoration:none}
  .openloop-sm:hover{text-decoration:none;filter:brightness(.98)}

  /* quiz */
  .quiz{margin:30px 0 0;padding-top:26px;border-top:1px dashed var(--hairline)}
  .quiz-h{display:flex;align-items:center;gap:11px;margin-bottom:4px}
  .quiz-h .qmark{width:30px;height:30px;border-radius:9px;background:var(--ink);color:#fff;display:grid;place-items:center;font-family:var(--fd);font-weight:800;font-size:15px}
  .quiz-h h2{margin:0;font-family:var(--fd);font-weight:800;font-size:21px;letter-spacing:-.02em}
  .quiz-sub{color:var(--muted);font-size:14.5px;margin:0 0 18px}
  .q{background:var(--paper);border:1px solid var(--hairline);border-radius:var(--r-md);padding:18px 20px;margin:14px 0;box-shadow:var(--shadow)}
  .q .qtext{font-weight:700;font-size:16.5px;color:var(--ink-soft);margin:0 0 13px;font-family:var(--fd);letter-spacing:-.01em;line-height:1.3}
  .opt{display:flex;gap:11px;align-items:flex-start;padding:11px 14px;border:1.5px solid var(--hairline);border-radius:11px;margin:8px 0;cursor:pointer;transition:.13s;font-size:15.5px;background:#fff}
  .opt:hover{border-color:var(--violet-bright);background:var(--hairline-2)}
  .opt .dot{flex:0 0 auto;width:19px;height:19px;border-radius:50%;border:2px solid var(--muted-2);margin-top:1px;display:grid;place-items:center;transition:.13s}
  .opt .dot i{width:8px;height:8px;border-radius:50%;background:var(--violet);opacity:0;transition:.13s}
  .opt.sel{border-color:var(--violet);background:var(--grad-soft)}
  .opt.sel .dot{border-color:var(--violet)}
  .opt.sel .dot i{opacity:1}
  .opt.correct{border-color:var(--mint);background:var(--mint-soft)}
  .opt.correct .dot{border-color:var(--mint);background:var(--mint)}
  .opt.correct .dot i{background:#fff;opacity:1}
  .opt.wrong{border-color:#e5736f;background:#fdeeee}
  .opt.wrong .dot{border-color:#e5736f;background:#e5736f}
  .opt.locked{pointer-events:none}
  .feedback{margin-top:12px;padding:13px 16px;border-radius:11px;font-size:14.5px;display:none;line-height:1.5}
  .feedback.show{display:block}
  .feedback.ok{background:var(--mint-soft);color:#0c5e45;border:1px solid #b7e8d6}
  .feedback.no{background:#fdeeee;color:#9c302c;border:1px solid #f3c9c7}
  .feedback b{font-weight:700}

  .checkbtn{margin-top:6px;border:0;cursor:pointer;font-family:var(--fb);font-weight:700;font-size:14.5px;color:#fff;background:var(--ink);padding:11px 22px;border-radius:11px;transition:.14s}
  .checkbtn:hover{background:var(--violet)}
  .checkbtn:disabled{opacity:.45;cursor:not-allowed}
  .checkbtn.again{background:var(--grad)}

  .module-done-banner{display:none;align-items:center;gap:13px;margin:24px 0 0;padding:16px 20px;border-radius:var(--r-md);background:var(--mint-soft);border:1px solid #bfead9;color:#0c5e45;font-weight:600;font-size:15px}
  .module-done-banner.show{display:flex;animation:pop .4s ease}
  .module-done-banner .bdg{width:30px;height:30px;flex:0 0 auto;border-radius:50%;background:var(--mint);color:#fff;display:grid;place-items:center}
  @keyframes pop{0%{transform:scale(.96);opacity:0}60%{transform:scale(1.02)}100%{transform:scale(1);opacity:1}}

  /* footer nav */
  .pager{display:flex;justify-content:space-between;gap:14px;margin-top:46px;padding-top:26px;border-top:1px solid var(--hairline)}
  .pager button{border:1px solid var(--hairline);background:var(--paper);cursor:pointer;border-radius:13px;padding:14px 20px;text-align:left;font-family:var(--fb);transition:.14s;flex:1;max-width:340px;box-shadow:var(--shadow)}
  .pager button:hover:not(:disabled){border-color:var(--violet-bright);transform:translateY(-1px)}
  .pager button:disabled{opacity:.4;cursor:not-allowed}
  .pager .pg-dir{font-family:var(--fm);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-2);display:block;margin-bottom:3px}
  .pager .pg-name{font-family:var(--fd);font-weight:700;font-size:15.5px;color:var(--ink-soft);letter-spacing:-.01em}
  .pager .next{text-align:right}

  /* ---------- Hero (intro module) ---------- */
  .hero{position:relative;overflow:hidden;border-radius:26px;background:var(--ink);color:#fff;padding:46px 44px 40px;margin-bottom:8px;box-shadow:var(--shadow-lg)}
  .hero-grid{position:absolute;inset:0;background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,.07) 1px,transparent 0);background-size:26px 26px;opacity:.6}
  .hero-loop{position:absolute;right:-40px;top:50%;transform:translateY(-50%);width:430px;height:430px;opacity:.95;pointer-events:none}
  .hero-content{position:relative;max-width:560px}
  .hero .eyebrow{color:#c9bdff}
  .hero .eyebrow .dash{background:linear-gradient(90deg,#a78bfa,#f472b6)}
  .hero h1{font-family:var(--fd);font-weight:800;letter-spacing:-.035em;line-height:.98;font-size:clamp(38px,6vw,62px);margin:16px 0 14px}
  .hero h1 .flow{background:linear-gradient(115deg,#c4b5fd,#f9a8d4);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero p{font-size:18px;color:#cfc6ef;max-width:46ch;margin:0 0 26px}
  .hero-cta{display:flex;flex-wrap:wrap;gap:12px;align-items:center}
  .btn-primary{display:inline-flex;align-items:center;gap:9px;background:#fff;color:var(--ink);font-family:var(--fb);font-weight:700;font-size:15px;padding:13px 22px;border-radius:13px;border:0;cursor:pointer;transition:.14s;text-decoration:none}
  .btn-primary:hover{transform:translateY(-1px);text-decoration:none}
  .btn-ghost{display:inline-flex;align-items:center;gap:9px;background:rgba(255,255,255,.09);color:#fff;font-family:var(--fb);font-weight:700;font-size:15px;padding:13px 22px;border-radius:13px;border:1px solid rgba(255,255,255,.16);cursor:pointer;transition:.14s;text-decoration:none}
  .btn-ghost:hover{background:rgba(255,255,255,.16);text-decoration:none}

  .facts{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:26px 0 6px}
  .fact{background:var(--paper);border:1px solid var(--hairline);border-radius:var(--r-md);padding:18px;box-shadow:var(--shadow)}
  .fact .n{font-family:var(--fd);font-weight:800;font-size:30px;letter-spacing:-.03em;line-height:1;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .fact .l{font-size:13.5px;color:var(--muted);margin-top:6px;line-height:1.35}

  .intro-h2{font-family:var(--fd);font-weight:800;font-size:25px;letter-spacing:-.02em;margin:40px 0 6px}
  .intro-sub{color:var(--muted);font-size:16px;margin:0 0 20px;max-width:60ch}
  .pillars{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .pillar{background:var(--paper);border:1px solid var(--hairline);border-radius:var(--r-lg);padding:22px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .pillar .pic{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;background:var(--grad-soft);color:var(--violet);margin-bottom:14px}
  .pillar h4{font-family:var(--fd);font-weight:800;font-size:18px;margin:0 0 5px;letter-spacing:-.01em}
  .pillar p{font-size:14px;color:var(--muted);margin:0;line-height:1.5}
  .pillar .tier{font-family:var(--fm);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-2);margin-bottom:10px}

  .how-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:18px}
  .how{background:var(--paper);border:1px solid var(--hairline);border-radius:var(--r-md);padding:20px 22px;box-shadow:var(--shadow)}
  .how h4{font-family:var(--fd);font-weight:700;font-size:16.5px;margin:0 0 4px;display:flex;align-items:center;gap:9px;letter-spacing:-.01em}
  .how h4 .ic{color:var(--violet)}
  .how p{font-size:14.5px;color:var(--muted);margin:0}
  .how .plat{font-family:var(--fm);font-size:12px;color:var(--ink-soft);margin-top:9px;display:flex;flex-wrap:wrap;gap:6px}
  .how .plat span{background:var(--hairline-2);padding:3px 9px;border-radius:7px;border:1px solid var(--hairline)}

  /* three-layer diagram */
  .layers{margin:8px 0 4px}
  .layer{display:flex;align-items:center;gap:16px;padding:16px 18px;border-radius:var(--r-md);margin:9px 0;position:relative}
  .layer.l1{background:linear-gradient(90deg,rgba(110,86,248,.10),rgba(110,86,248,.03));border:1px solid rgba(110,86,248,.22)}
  .layer.l2{background:linear-gradient(90deg,rgba(168,85,247,.10),rgba(168,85,247,.03));border:1px solid rgba(168,85,247,.22);margin-left:26px}
  .layer.l3{background:linear-gradient(90deg,rgba(236,72,153,.10),rgba(236,72,153,.03));border:1px solid rgba(236,72,153,.22);margin-left:52px}
  .layer .lic{width:40px;height:40px;flex:0 0 auto;border-radius:11px;display:grid;place-items:center;color:#fff}
  .layer.l1 .lic{background:#6e56f8}.layer.l2 .lic{background:#a855f7}.layer.l3 .lic{background:#ec4899}
  .layer .ltxt b{font-family:var(--fd);font-weight:800;font-size:16px;display:block;letter-spacing:-.01em}
  .layer .ltxt span{font-size:13.5px;color:var(--muted)}

  /* component gallery */
  .gallery{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:14px 0}
  .comp{display:flex;gap:13px;align-items:flex-start;background:var(--paper);border:1px solid var(--hairline);border-radius:var(--r-sm);padding:14px 15px;box-shadow:var(--shadow)}
  .comp .cic{width:34px;height:34px;flex:0 0 auto;border-radius:9px;background:var(--grad-soft);color:var(--violet);display:grid;place-items:center}
  .comp b{font-family:var(--fd);font-weight:700;font-size:14.5px;display:block;letter-spacing:-.01em}
  .comp span{font-size:13px;color:var(--muted);line-height:1.4}

  /* sync diagram */
  .sync{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:center;margin:18px 0}
  .sync-app{background:var(--paper);border:1px solid var(--hairline);border-radius:var(--r-md);padding:16px;text-align:center;box-shadow:var(--shadow)}
  .sync-app .ttl{font-family:var(--fm);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:9px}
  .sync-chip{background:var(--grad-soft);border:1px solid rgba(110,86,248,.25);border-radius:9px;padding:9px;font-size:12.5px;color:var(--ink-soft);font-weight:600}
  .sync-mid{display:flex;flex-direction:column;align-items:center;color:var(--violet);font-family:var(--fm);font-size:10px;letter-spacing:.1em;gap:4px}

  /* scope split */

/* ============================================================
   STORAGE — works in the Claude artifact viewer (persistent
   storage), as a hosted/intranet page (localStorage), and
   falls back to in-memory if both are blocked. Never throws.
   ============================================================ */
const KEY = 'ms_loop_course_v1';
let mem = null;
async function loadState(){
  try{ if(window.storage && window.storage.get){ const r = await window.storage.get(KEY); if(r && r.value) return JSON.parse(r.value); } }catch(e){}
  try{ const v = window.localStorage.getItem(KEY); if(v) return JSON.parse(v); }catch(e){}
  return mem;
}
async function saveState(s){
  mem = s; const str = JSON.stringify(s);
  try{ if(window.storage && window.storage.set){ await window.storage.set(KEY, str); flashSaved(); return; } }catch(e){}
  try{ window.localStorage.setItem(KEY, str); }catch(e){}
  flashSaved();
}
let toastT;
function flashSaved(){ const t=document.getElementById('toast'); if(!t)return; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),1400); }

      <p>Write a task list once, drop it into a Teams chat and an Outlook email, and it's the <em>same</em> living list in both. Tick something off in the email and it updates in the chat instantly. Nobody emails "v3_final_FINAL.docx" around.</p>

/* ============================================================
   STATE + APP
   ============================================================ */
const TOTAL_MODULES = COURSE.filter(m=>m.type==='lesson').length; // 7
let state = { completed:{}, hands:{}, answers:{}, name:'', cur:0 };
let cur = 0;

async function init(){
  const saved = await loadState();
  if(saved) state = Object.assign(state, saved);
  cur = state.cur || 0;
  if(cur>=COURSE.length) cur=0;
  buildNav();
  render();
  wireChrome();
}

function persist(){ state.cur = cur; saveState(state); }

function moduleProgress(){
  const done = COURSE.filter(m=>m.type==='lesson' && state.completed[m.id]).length;
  return {done, pct: Math.round(done/TOTAL_MODULES*100)};
}

function buildNav(){
  const nav = document.getElementById('nav');
  const starSvg = '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.4H22l-6 4.4 2.3 7.2L12 16.6 5.7 21l2.3-7.2-6-4.4h7.6z"/></svg>';
  const checkSvg = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  const navCheck = '<span class="nav-check" style="color:#13b083"><svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>';
  let html = '<div class="nav-label">Course</div>';
  COURSE.forEach(function(m,i){
    const done = state.completed[m.id] ? 'done' : '';
    const label = m.type==='intro' ? 'Welcome' : (m.type==='final' ? 'Final &amp; certificate' : m.nav);
    const num = m.type==='lesson' ? String(m.num) : (m.type==='final' ? checkSvg : starSvg);
    html += '<button class="nav-item '+done+'" data-i="'+i+'" onclick="go('+i+')">'
      + '<span class="nav-num">'+num+'</span>'
      + '<span class="nav-txt">'+label+'</span>'
      + navCheck
      + '</button>';
  });
  nav.innerHTML = html;
  updateProgressUI();
}

function updateNavActive(){
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active', +el.dataset.i===cur);
    const m = COURSE[+el.dataset.i];
    el.classList.toggle('done', !!state.completed[m.id]);
  });
}

function updateProgressUI(){
  const {done,pct} = moduleProgress();
  const circ = 138.2;
  const fill = document.getElementById('ringFill');
  if(fill) fill.style.strokeDashoffset = circ - (circ*pct/100);
  const rp=document.getElementById('ringPct'); if(rp) rp.textContent = pct+'%';
  const dc=document.getElementById('doneCount'); if(dc) dc.textContent = done+' of '+TOTAL_MODULES;
  const tp=document.getElementById('tbPct'); if(tp) tp.textContent = pct+'%';
}

/* -------- Render a module -------- */
function render(){
  const m = COURSE[cur];
  const c = document.getElementById('canvas');
  window.scrollTo({top:0,behavior:'instant'});
  document.querySelector('.main').scrollTop=0;

  if(m.type==='intro'){ c.innerHTML = m.render(); }
  else if(m.type==='final'){ c.innerHTML = renderFinal(); wireFinal(); }
  else { c.innerHTML = renderLesson(m); wireLesson(m); }

  // pager
  if(m.type!=='final' || true){ c.insertAdjacentHTML('beforeend', renderPager()); }
  document.getElementById('tbTitle').textContent = (m.type==='intro'?'Welcome':(m.type==='final'?'Final & certificate':m.nav));
  updateNavActive(); updateProgressUI();
  persist();
}

function renderLesson(m){
  return `
    <div class="eyebrow"><span class="dash"></span> ${m.eyebrow}</div>
    <h1 class="module-title">${m.title}</h1>
    <p class="lede">${m.lede}</p>
    <div class="module-body">${m.body()}</div>
    ${renderTryit(m)}
    ${renderQuiz(m)}
    <div class="module-done-banner" id="doneBanner">
      <span class="bdg"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      <span>Module complete — nice work. Your progress is saved.</span>
    </div>`;
}

function renderTryit(m){
  if(!m.tryit) return '';
  const items = m.tryit.items.map((it,idx)=>{
    const id = m.id+'_h'+idx;
    const checked = state.hands[id] ? 'checked':'';
    return `<li><label>
      <input type="checkbox" data-hand="${id}" ${checked}>
      <span class="box">${I.tick}</span>
      <span class="ctxt"><b>${it[0]}.</b> ${it[1]}</span>
    </label></li>`;
  }).join('');
  return `<div class="tryit">
    <div class="tryit-head"><span class="tag">Try it in real Loop</span><h3>${m.tryit.title}</h3></div>
    <p class="sub">${m.tryit.sub}</p>
    <ul class="checklist">${items}</ul>
    <div class="tryit-foot">Need it? <a class="openloop-sm" href="https://loop.cloud.microsoft" target="_blank" rel="noopener">${I.comp} Open Microsoft Loop</a></div>
  </div>`;
}

function renderQuiz(m){
  if(!m.quiz) return '';
  const qs = m.quiz.map((q,qi)=>{
    const saved = state.answers[m.id] && state.answers[m.id][qi];
    const opts = q.opts.map((o,oi)=>{
      let cls='opt';
      if(saved!=null){
        cls+=' locked';
        if(oi===q.a) cls+=' correct';
        else if(oi===saved) cls+=' wrong';
        else if(oi===saved) cls+=' sel';
      }
      return `<div class="${cls}" data-q="${qi}" data-o="${oi}"><span class="dot"><i></i></span><span>${o}</span></div>`;
    }).join('');
    const fb = saved!=null
      ? `<div class="feedback show ${saved===q.a?'ok':'no'}"><b>${saved===q.a?'Correct.':'Not quite.'}</b> ${q.why}</div>`
      : `<div class="feedback"></div>`;
    return `<div class="q" data-qi="${qi}"><p class="qtext">${qi+1}. ${q.q}</p>${opts}${fb}</div>`;
  }).join('');
  const allDone = state.completed[m.id];
  return `<div class="quiz">
    <div class="quiz-h"><span class="qmark">?</span><h2>Quick check</h2></div>
    <p class="quiz-sub">Answer to lock in the module. Get one wrong? You'll see why and can try again.</p>
    ${qs}
    <button class="checkbtn" id="checkBtn" ${allDone?'disabled':''}>${allDone?'Module passed ✓':'Check answers'}</button>
  </div>`;
}

function renderPager(){
  const prev = cur>0 ? COURSE[cur-1] : null;
  const nextM = cur<COURSE.length-1 ? COURSE[cur+1] : null;
  const nm = m => m.type==='intro'?'Welcome':(m.type==='final'?'Final & certificate':(m.num?('Module '+m.num+' · '+m.nav):m.nav));
  return `<div class="pager">
    <button ${prev?'':'disabled'} onclick="go(${cur-1})">
      <span class="pg-dir">← Previous</span><span class="pg-name">${prev?nm(prev):'—'}</span></button>
    <button class="next" ${nextM?'':'disabled'} onclick="go(${cur+1})">
      <span class="pg-dir">Next →</span><span class="pg-name">${nextM?nm(nextM):'—'}</span></button>
  </div>`;
}

/* -------- Wire interactions -------- */
function wireLesson(m){
  // hands-on checkboxes
  document.querySelectorAll('[data-hand]').forEach(cb=>{
    cb.addEventListener('change',()=>{ state.hands[cb.dataset.hand]=cb.checked; persist(); });
  });
  if(!m.quiz) return;

  let selected = {}; // qi -> oi (pre-check)
  // restore selection state if already answered handled in render
  document.querySelectorAll('.q .opt').forEach(opt=>{
    if(opt.classList.contains('locked')) return;
    opt.addEventListener('click',()=>{
      const qi=opt.dataset.q;
      document.querySelectorAll(`.opt[data-q="${qi}"]`).forEach(o=>o.classList.remove('sel'));
      opt.classList.add('sel'); selected[qi]=+opt.dataset.o;
    });
  });

  const btn = document.getElementById('checkBtn');
  if(!btn) return;
  if(state.completed[m.id]){ revealBanner(false); }
  btn.addEventListener('click',()=>{
    if(btn.textContent.indexOf('Try again')>-1){
      // reset this module's quiz
      delete state.answers[m.id];
      state.completed[m.id]=false; selected={};
      buildNav(); render(); return;
    }
    // ensure all answered
    const total=m.quiz.length;
    if(Object.keys(selected).length<total){
      btn.textContent='Answer every question first';
      setTimeout(()=>{ if(!state.completed[m.id]) btn.textContent='Check answers'; },1500);
      return;
    }
    // grade
    let correct=0; state.answers[m.id]={};
    m.quiz.forEach((q,qi)=>{
      const pick=selected[qi]; state.answers[m.id][qi]=pick;
      if(pick===q.a) correct++;
      const qEl=document.querySelector(`.q[data-qi="${qi}"]`);
      qEl.querySelectorAll('.opt').forEach(o=>{
        o.classList.add('locked');
        const oi=+o.dataset.o;
        o.classList.remove('sel');
        if(oi===q.a) o.classList.add('correct');
        else if(oi===pick) o.classList.add('wrong');
      });
      const fb=qEl.querySelector('.feedback');
      fb.className='feedback show '+(pick===q.a?'ok':'no');
      fb.innerHTML=`<b>${pick===q.a?'Correct.':'Not quite.'}</b> ${q.why}`;
    });
    const passed = correct===total;
    state.completed[m.id]=passed;
    persist(); buildNav(); updateProgressUI();
    if(passed){
      btn.disabled=true; btn.textContent='Module passed ✓';
      revealBanner(true);
    }else{
      btn.disabled=false; btn.classList.add('again');
      btn.textContent=`Try again (${correct}/${total} right)`;
    }
    document.querySelector('.quiz').scrollIntoView({behavior:'smooth',block:'nearest'});
  });
}

function revealBanner(animate){
  const b=document.getElementById('doneBanner');
  if(b) b.classList.add('show');
}

/* -------- Final + certificate -------- */
function renderFinal(){
  const {done,pct}=moduleProgress();
  const allDone = done===TOTAL_MODULES;
  const circ=2*Math.PI*52;
  const off=circ-(circ*pct/100);

  const status = allDone
    ? `<p class="lede" style="margin-bottom:0">Every module complete. Put your name on it and make it official.</p>`
    : `<p class="lede" style="margin-bottom:0">You've finished <b>${done} of ${TOTAL_MODULES}</b> modules. Wrap up the rest to unlock your certificate — your progress is saved, so you can come back anytime.</p>`;

  let body = `
    <div class="eyebrow"><span class="dash"></span> ${COURSE[cur].eyebrow}</div>
    <h1 class="module-title">${allDone?'You\'re Loop-fluent. 🎉':'Almost there'}</h1>
    ${status}
    <div class="card score-block" style="text-align:center;margin-top:28px">
      <div class="score-ring">
        <svg width="120" height="120" viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="52" stroke="#eee" stroke-width="9" fill="none"/>
          <circle cx="60" cy="60" r="52" stroke="url(#bg)" stroke-width="9" fill="none" stroke-linecap="round"
            stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 60 60)"/>
        </svg>
        <div class="num">${pct}%<small>${done}/${TOTAL_MODULES} modules</small></div>
      </div>
      <p style="margin:6px 0 0;color:var(--muted);font-size:15px">${allDone?'Course complete':'Keep going — you\'ve got this'}</p>
    </div>`;

  if(allDone){
    const today = new Date().toLocaleDateString(undefined,{year:'numeric',month:'long',day:'numeric'});
    if(state.name){
      body += renderCertificate(state.name, today);
    } else {
      body += `
      <h2 class="intro-h2" style="text-align:center">Add your name to your certificate</h2>
      <div class="name-row">
        <input id="nameInput" type="text" placeholder="Your full name" maxlength="40" value="">
        <button onclick="setName()">Generate certificate</button>
      </div>`;
    }
  } else {
    // show which remain
    const remaining = COURSE.filter(m=>m.type==='lesson' && !state.completed[m.id]);
    body += `<h2 class="intro-h2">Still to finish</h2><div class="gallery">`+
      remaining.map(m=>`<div class="comp" style="cursor:pointer" onclick="go(${COURSE.indexOf(m)})">
        <div class="cic">${m.num}</div><div><b>${m.nav}</b><span>Open module ${m.num} →</span></div></div>`).join('')
      +`</div>`;
  }
  return body;
}

function renderCertificate(name, date){
  return `
  <div class="certificate" id="cert">
    <div class="cert-grid"></div>
    <div class="cert-in">
      <svg class="cert-seal" viewBox="0 0 64 64" fill="none">
        <defs><linearGradient id="sg" x1="0" y1="0" x2="64" y2="64"><stop offset="0" stop-color="#8a72ff"/><stop offset="1" stop-color="#f472b6"/></linearGradient></defs>
        <circle cx="32" cy="32" r="28" stroke="url(#sg)" stroke-width="2.5" stroke-dasharray="3 4"/>
        <path d="M22 32c0-5.5 4.5-10 10-10s10 4.5 10 10-4.5 10-10 10c-3.6 0-5.6-2-7.6-4.8C22.4 33.6 21 32 18.5 32" stroke="url(#sg)" stroke-width="3.4" stroke-linecap="round" fill="none"/>
        <path d="M27 32l3.5 3.5L40 27" stroke="url(#sg)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <div class="cert-k">Certificate of Completion</div>
      <p class="cert-sub">This certifies that</p>
      <div class="cert-name">${escapeHtml(name)}</div>
      <p class="cert-sub" style="margin-top:14px">has completed the hands-on course</p>
      <div class="cert-course">Getting Started with Microsoft Loop</div>
      <div class="cert-foot">
        <div class="blk"><div class="lbl">Completed</div><div class="val">${date}</div></div>
        <div class="blk r"><div class="lbl">Modules</div><div class="val">${TOTAL_MODULES} / ${TOTAL_MODULES} passed</div></div>
      </div>
    </div>
  </div>
  <div class="cert-actions">
    <button class="btn-primary" style="background:var(--ink);color:#fff" onclick="window.print()">${I.page} Print / save as PDF</button>
    <button class="btn-ghost" style="background:var(--grad-soft);color:var(--violet);border-color:var(--hairline)" onclick="changeName()">Change name</button>
  </div>`;
}

function wireFinal(){
  const ni=document.getElementById('nameInput');
  if(ni){ ni.focus(); ni.addEventListener('keydown',e=>{ if(e.key==='Enter') setName(); }); }
}
function setName(){
  const ni=document.getElementById('nameInput');
  if(!ni) return;
  const v=ni.value.trim();
  if(!v){ ni.focus(); ni.style.borderColor='var(--magenta)'; return; }
  state.name=v; persist(); render();
}
function changeName(){ state.name=''; persist(); render(); }

/* ============================================================
   NAV / CHROME
   ============================================================ */
function go(i){
  if(i<0||i>=COURSE.length) return;
  cur=i; render();
  closeRail();
}
function next(){ go(cur+1); }

function wireChrome(){
  const burger=document.getElementById('burger');
  const rail=document.getElementById('rail');
  const scrim=document.getElementById('scrim');
  if(burger) burger.addEventListener('click',()=>{ rail.classList.add('open'); scrim.classList.add('show'); });
  if(scrim) scrim.addEventListener('click',closeRail);
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape') closeRail();
    if(e.target.tagName==='INPUT') return;
    if(e.key==='ArrowRight') next();
    if(e.key==='ArrowLeft') go(cur-1);
  });
}
function closeRail(){
  const rail=document.getElementById('rail'); const scrim=document.getElementById('scrim');
  if(rail) rail.classList.remove('open'); if(scrim) scrim.classList.remove('show');
}
window.go=go; window.next=next; window.setName=setName; window.changeName=changeName;

/* ============================================================
   HELPERS
   ============================================================ */
function escapeHtml(s){ return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function heroLoopSVG(){
  return `<svg class="hero-loop" viewBox="0 0 400 400" fill="none" aria-hidden="true">
    <defs>
      <linearGradient id="hl" x1="40" y1="100" x2="360" y2="300" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="#a78bfa"/><stop offset=".5" stop-color="#c084fc"/><stop offset="1" stop-color="#f472b6"/>
      </linearGradient>
      <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <path id="loopPath" d="M120 200 C120 130 200 130 200 200 C200 270 280 270 280 200 C280 130 200 130 200 200 C200 270 120 270 120 200 Z"
      stroke="url(#hl)" stroke-width="10" stroke-linecap="round" opacity=".5"/>
    <path class="pulse-dash" d="M120 200 C120 130 200 130 200 200 C200 270 280 270 280 200 C280 130 200 130 200 200 C200 270 120 270 120 200 Z"
      stroke="#fff" stroke-width="5" stroke-linecap="round" fill="none"
      stroke-dasharray="34 380" filter="url(#glow)">
      <animate attributeName="stroke-dashoffset" from="414" to="0" dur="3.4s" repeatCount="indefinite"/>
    </path>
    <circle r="7" fill="#fff" filter="url(#glow)">
      <animateMotion dur="3.4s" repeatCount="indefinite"
        path="M120 200 C120 130 200 130 200 200 C200 270 280 270 280 200 C280 130 200 130 200 200 C200 270 120 270 120 200 Z"/>
    </circle>
  </svg>`;
}

/* go */
init();
</script>
